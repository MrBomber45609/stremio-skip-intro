# Solo API Skip Intro (HTTPS con certbot)
# 1. Sustituye API_TU_DOMINIO por tu dominio (ej: api.midominio.com)
# 2. Copia a /etc/nginx/sites-available/skip-intro-api
# 3. sudo ln -s /etc/nginx/sites-available/skip-intro-api /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx
# 5. sudo certbot --nginx -d API_TU_DOMINIO

server {
    listen 80;
    server_name API_TU_DOMINIO;

    location / {
        proxy_pass http://127.0.0.1:3710;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
